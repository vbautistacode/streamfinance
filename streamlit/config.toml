# .streamlit/config.toml
[theme]
base = "light"                    # "light" ou "dark"
primaryColor = "#0d6efd"          # cor principal (botões, highlights)
backgroundColor = "#e9e9e9"       # fundo da página
secondaryBackgroundColor = "#ffffff"
textColor = "#0b2545"
font = "sans serif"               # "sans serif", "serif", "monospace"

[server]
headless = true
enableCORS = false
port = 8501

[browser]
gatherUsageStats = false